<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Launcher — Mistral AI Hackathon</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --border-active: #ff6b2b;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #ff6b2b;
      --accent-glow: rgba(255, 107, 43, 0.15);
      --success: #22c55e;
      --error: #ef4444;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    /* Subtle radial glow behind card */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    .header img {
      height: 32px;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      background: var(--accent);
      color: #000;
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Drop Zone */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      background: var(--surface);
      position: relative;
    }

    .dropzone:hover,
    .dropzone.dragging {
      border-color: var(--accent);
      background: rgba(255, 107, 43, 0.04);
    }

    .dropzone.has-file {
      border-color: var(--success);
      border-style: solid;
    }

    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.6;
    }

    .dropzone-text {
      font-size: 0.95rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .dropzone-text strong {
      color: var(--accent);
      font-weight: 600;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
    }

    .file-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--success);
    }

    .file-remove {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      transition: color 0.2s;
    }

    .file-remove:hover {
      color: var(--error);
    }

    /* Hidden file input */
    input[type="file"] {
      display: none;
    }

    /* Submit Button */
    .submit-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: var(--accent);
      color: #000;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(255, 107, 43, 0.3);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Response Card */
    .response-card {
      margin-top: 1.5rem;
      border-radius: 12px;
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
      overflow-y: auto;
      animation: fadeUp 0.3s ease;
    }

    .response-card.success {
      background: rgba(34, 197, 94, 0.06);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .response-card.error {
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      opacity: 0.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="container" x-data="resumeApp()">

    <div class="header">
      <img src="https://mintlify.s3.us-west-1.amazonaws.com/mistral/logo/light.svg"
           alt="Mistral AI"
           onerror="this.style.display='none'" />
      <h1>Resume Launcher</h1>
      <span>Hackathon</span>
    </div>

    <!-- Drop Zone -->
    <div
      class="dropzone"
      :class="{ 'dragging': dragging, 'has-file': file }"
      @click="$refs.fileInput.click()"
      @dragover.prevent="dragging = true"
      @dragleave.prevent="dragging = false"
      @drop.prevent="handleDrop($event)"
    >
      <input
        type="file"
        x-ref="fileInput"
        accept=".md,.pdf,.txt,.doc,.docx"
        @change="handleFileSelect($event)"
      />

      <template x-if="!file">
        <div>
          <div class="dropzone-icon">📄</div>
          <div class="dropzone-text">
            Drag & drop your resume here<br />
            or <strong>click to browse</strong>
            <br />
            <small style="opacity:0.5">.md · .pdf · .txt · .doc · .docx</small>
          </div>
        </div>
      </template>

      <template x-if="file">
        <div class="file-info">
          <span>✅</span>
          <span class="file-name" x-text="file.name"></span>
          <button class="file-remove" @click.stop="removeFile()" title="Remove">✕</button>
        </div>
      </template>
    </div>

    <!-- Submit -->
    <button
      class="submit-btn"
      :disabled="!file || loading"
      @click="submit()"
    >
      <template x-if="loading">
        <span><span class="spinner"></span>Analyzing...</span>
      </template>
      <template x-if="!loading">
        <span>🚀 Launch Resume</span>
      </template>
    </button>

    <!-- Response -->
    <template x-if="response">
      <div class="response-card" :class="responseType" x-text="response"></div>
    </template>

    <div class="footer">POST /launch/ · localhost:8000</div>
  </div>

  <script>
    function resumeApp() {
      return {
        file: null,
        dragging: false,
        loading: false,
        response: null,
        responseType: 'success',

        // ── Change this to your actual API URL ──
        API_URL: 'http://localhost:8000/launch/',

        handleDrop(event) {
          this.dragging = false;
          const files = event.dataTransfer.files;
          if (files.length > 0) this.file = files[0];
        },

        handleFileSelect(event) {
          const files = event.target.files;
          if (files.length > 0) this.file = files[0];
        },

        removeFile() {
          this.file = null;
          this.response = null;
          this.$refs.fileInput.value = '';
        },

        async submit() {
          if (!this.file || this.loading) return;

          this.loading = true;
          this.response = null;

          const formData = new FormData();
          formData.append('resume', this.file);

          try {
            const res = await fetch(this.API_URL, {
              method: 'POST',
              body: formData,
            });

            const data = await res.json();

            if (res.ok) {
              this.responseType = 'success';
              this.response = JSON.stringify(data, null, 2);
            } else {
              this.responseType = 'error';
              this.response = `Error ${res.status}: ${JSON.stringify(data, null, 2)}`;
            }
          } catch (err) {
            this.responseType = 'error';
            this.response = `Network error: ${err.message}`;
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>

</body>
</html>
